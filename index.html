<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Visualizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #181818; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        .spotify-green { color: #1DB954; }
        button { background: #1DB954; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 10px; }
        button:hover { transform: scale(1.05); background: #1ed760; }
        select { background: #282828; color: white; border: 1px solid #333; padding: 10px; border-radius: 10px; margin: 15px 0; width: 100%; }
        #image-result { width: 100%; border-radius: 15px; margin-top: 20px; display: none; border: 2px solid #333; }
        .loader { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1 class="spotify-green">🎨 Spotify <span style="color:white">to</span> Art</h1>
    <p>הפוך את המוזיקה שלך ליצירת אוריגמי</p>

    <div id="login-section">
        <button onclick="loginWithSpotify()">התחבר עם Spotify</button>
    </div>

    <div id="app-section" style="display:none;">
        <label for="time-range">בחר תקופה:</label>
        <select id="time-range">
            <option value="short_term">החודש האחרון</option>
            <option value="medium_term">חצי שנה אחרונה</option>
            <option value="long_term">כל הזמן</option>
        </select>
        <button onclick="startProcess()">צור תמונה ב-Gemini</button>
    </div>

    <div id="loader" class="loader">
        <p>מנתח את הטעם שלך... 🎧</p>
        <small>(זה לוקח כמה שניות)</small>
    </div>

    <img id="image-result" src="" alt="Your Musical Mood">
</div>

<script type="module">
    // ייבוא Gemini
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const SPOTIFY_CLIENT_ID = '5dc58d7ce97b4cb7841eb81f8aed9fa7; // הכנס כאן את ה-ID מספוטיפיי
    const GEMINI_API_KEY = 'AIzaSyBjL-loTU38OiYjvrJQSr_TkcvzJAdF9Ek'; // הכנס כאן את המפתח שלך (או השאר ריק אם תרצה לבקש מהמשתמש)
    
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    // ניהול טוקן ספוטיפיי
    const params = new URLSearchParams(window.location.hash.substring(1));
    let accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    window.loginWithSpotify = () => {
        const scope = 'user-top-read';
        window.location.href = `http://googleusercontent.com/spotify.com/3{SPOTIFY_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scope}`;
    };

    window.startProcess = async () => {
        const loader = document.getElementById('loader');
        const imgDisplay = document.getElementById('image-result');
        loader.style.display = 'block';
        imgDisplay.style.display = 'none';

        try {
            // 1. משוך שירים מספוטיפיי
            const timeRange = document.getElementById('time-range').value;
            const res = await fetch(`http://googleusercontent.com/spotify.com/4{timeRange}&limit=10`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            const musicData = data.items.map(t => `${t.name} (${t.artists[0].name})`).join(", ");

            // 2. הפעל את Gemini
            const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `Based on these songs: ${musicData}. 
            Describe a beautiful, complex origami/paper-folding art scene that represents the mood of this music. 
            The description should be purely visual, artistic, and abstract. 
            NO TEXT OR LETTERS.`;

            const result = await model.generateContent(prompt);
            const visualPrompt = result.response.text();

            // 3. כאן בשלב הבא נחבר את Imagen ליצירת התמונה
            // בינתיים נדפיס לקונסול את התיאור שנוצר
            console.log("Visual Prompt:", visualPrompt);
            alert("Gemini יצר תיאור! עכשיו צריך לחבר את שלב יצירת התמונה הסופי.");
            
        } catch (err) {
            console.error(err);
            alert("שגיאה. וודא שהמפתחות תקינים.");
        } finally {
            loader.style.display = 'none';
        }
    };
</script>
</body>
</html>
