<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Spotify Visualizer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .card { background: #181818; padding: 30px; border-radius: 20px; display: inline-block; }
        button { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px; margin: 10px; }
        #image-result { width: 400px; border-radius: 10px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>🎨 Spotify Origami Art</h1>
    
    <div id="login-section">
        <button id="login-btn">התחבר לספוטיפיי</button>
    </div>

    <div id="app-section" style="display:none;">
        <select id="time-range">
            <option value="short_term">חודש אחרון</option>
            <option value="long_term">כל הזמן</option>
        </select>
        <button id="generate-btn">צור תמונת אוריגמי</button>
    </div>

    <div id="loader" style="display:none;">מייצר קסם... ✨</div>
    <img id="image-result" src="" alt="Result">
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const CLIENT_ID = '5dc58d7ce97b4cb7841eb81f8aed9fa7'; // שים כאן את ה-ID שלך
    const GEMINI_KEY = 'AIzaSyBjL-loTU38OiYjvrJQSr_TkcvzJAdF9Ek'; // שים כאן את המפתח שלך

    // בדיקת טוקן
    const params = new URLSearchParams(window.location.hash.substring(1));
    let accessToken = params.get('access_token');

    if (accessToken) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
    }

    // חיבור כפתור לוגין
    document.getElementById('login-btn').onclick = () => {
        const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&scope=user-top-read`;
        window.location.href = url;
    };

    // חיבור כפתור יצירה
    document.getElementById('generate-btn').onclick = async () => {
        const loader = document.getElementById('loader');
        const img = document.getElementById('image-result');
        loader.style.display = 'block';

        try {
            // 1. קבלת שירים
            const range = document.getElementById('time-range').value;
            const res = await fetch(`https://api.spotify.com/v1/me/top/tracks?time_range=${range}&limit=5`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const data = await res.json();
            const musicText = data.items.map(t => t.name).join(", ");

            // 2. יצירת פרומפט עם Gemini
            const genAI = new GoogleGenerativeAI(GEMINI_KEY);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const prompt = `Describe a single, artistic origami paper-folding scene inspired by: ${musicText}. No text, no letters. High quality.`;
            
            const result = await model.generateContent(prompt);
            const visualPrompt = result.response.text();

            // 3. יצירת תמונה עם Pollinations (חינם וללא מפתח!)
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(visualPrompt + " origami style, paper art, 3d render")}?width=512&height=512&nologo=true`;
            
            img.src = imageUrl;
            img.style.display = 'block';
        } catch (e) {
            alert("שגיאה! וודא שהמפתחות תקינים.");
        } finally {
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
