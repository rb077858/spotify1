<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Origami Art</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; background: #181818; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .spotify-green { color: #1DB954; }
        button { background: #1DB954; color: white; border: none; padding: 15px 35px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; width: 100%; margin: 10px 0; }
        button:hover { transform: scale(1.03); background: #1ed760; }
        select { background: #282828; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; width: 100%; margin: 15px 0; font-size: 16px; }
        #image-result { width: 100%; border-radius: 15px; margin-top: 25px; display: none; box-shadow: 0 0 25px rgba(29, 185, 84, 0.2); }
        .loader { display: none; color: #1DB954; margin: 20px 0; font-size: 18px; font-weight: 500; }
        .status-msg { font-size: 14px; color: #b3b3b3; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="spotify-green">🎨 Spotify Origami Art</h1>
    <p>הפוך את המוזיקה שלך לאמנות קיפולי נייר</p>

    <div id="login-section">
        <button id="btn-login">התחבר עם Spotify</button>
        <p class="status-msg">נדרשת התחברות כדי לקרוא את השירים שלך</p>
    </div>

    <div id="app-section" style="display:none;">
        <label>בחר טווח זמן לניתוח השירים:</label>
        <select id="time-range">
            <option value="short_term">החודש האחרון</option>
            <option value="medium_term">חצי שנה אחרונה</option>
            <option value="long_term">כל הזמן (Top Tracks)</option>
        </select>
        <button id="btn-generate">צור יצירת אוריגמי מהשירים שלי ✨</button>
    </div>

    <div id="loader" class="loader">מנתח שירים ויוצר אמנות... ⏳</div>
    <img id="image-result" src="" alt="Musical Origami Art">
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // --- הגדרות אישיות ---
    const clientId = '5dc58d7ce97b4cb7841eb81f8aed9fa7'; 
    const geminiApiKey = 'AIzaSyBjL-loTU38OiYjvrJQSr_TkcvzJAdF9Ek';
    const redirectUri = window.location.origin + window.location.pathname;

    // --- עוזרים ל-PKCE (אבטחת ספוטיפיי) ---
    const generateRandomString = (length) => {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        const values = crypto.getRandomValues(new Uint8Array(length));
        return Array.from(values).map((x) => possible[x % possible.length]).join('');
    };

    const sha256 = async (plain) => {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest('SHA-256', data);
    };

    const base64encode = (input) => {
        return btoa(String.fromCharCode(...new Uint8Array(input)))
            .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    };

    // --- 1. פונקציית לוגין ---
    document.getElementById('btn-login').onclick = async () => {
        const codeVerifier = generateRandomString(64);
        const hashed = await sha256(codeVerifier);
        const codeChallenge = base64encode(hashed);

        window.localStorage.setItem('code_verifier', codeVerifier);

        const params = new URLSearchParams({
            response_type: 'code',
            client_id: clientId,
            scope: 'user-top-read',
            code_challenge_method: 'S256',
            code_challenge: codeChallenge,
            redirect_uri: redirectUri,
        });

        window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
    };

    // --- 2. טיפול בחזרה מספוטיפיי (קבלת הטוקן) ---
    const urlParams = new URLSearchParams(window.location.search);
    let code = urlParams.get('code');

    if (code) {
        handleCallback(code);
    } else if (window.localStorage.getItem('access_token')) {
        showApp();
    }

    async function handleCallback(code) {
        const codeVerifier = window.localStorage.getItem('code_verifier');
        
        try {
            const response = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: clientId,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: redirectUri,
                    code_verifier: codeVerifier,
                }),
            });

            const data = await response.json();
            if (data.access_token) {
                window.localStorage.setItem('access_token', data.access_token);
                // ניקוי ה-URL כדי שלא ננסה להשתמש באותו קוד שוב
                window.history.replaceState({}, document.title, window.location.pathname);
                showApp();
            }
        } catch (err) {
            console.error("Token Error:", err);
        }
    }

    function showApp() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
    }

    // --- 3. יצירת האמנות ---
    document.getElementById('btn-generate').onclick = async () => {
        const loader = document.getElementById('loader');
        const imgDisplay = document.getElementById('image-result');
        const token = window.localStorage.getItem('access_token');
        
        loader.style.display = 'block';
        imgDisplay.style.display = 'none';

        try {
            // א. משיכת שירים מה-API של ספוטיפיי
            const range = document.getElementById('time-range').value;
            const spotRes = await fetch(`https://api.spotify.com/v1/me/top/tracks?time_range=${range}&limit=8`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (spotRes.status === 401) {
                alert("החיבור פג תוקף, אנא התחבר מחדש.");
                window.localStorage.clear();
                window.location.reload();
                return;
            }

            const musicData = await spotRes.json();
            const songNames = musicData.items.map(t => `${t.name} by ${t.artists[0].name}`).join(", ");

            // ב. שימוש ב-Gemini ליצירת תיאור ויזואלי (Prompt)
            const genAI = new GoogleGenerativeAI(geminiApiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `I'm listening to these songs: ${songNames}. 
            Create a very detailed artistic prompt for an image generator. 
            The theme MUST be "Origami Style" (Japanese paper folding). 
            Represent the emotions of the songs using paper colors and shapes. 
            STRICTLY NO TEXT, NO LETTERS, NO NUMBERS. Purely visual origami art.`;
            
            const result = await model.generateContent(prompt);
            const visualPrompt = result.response.text();

            // ג. יצירת התמונה דרך Pollinations (חינמי ומהיר)
            const seed = Math.floor(Math.random() * 999999);
            const finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(visualPrompt + ", origami paper art style, high detail, studio lighting")}?width=512&height=512&nologo=true&seed=${seed}&model=flux`;
            
            imgDisplay.src = finalImageUrl;
            imgDisplay.onload = () => {
                loader.style.display = 'none';
                imgDisplay.style.display = 'block';
            };

        } catch (err) {
            console.error("Process Error:", err);
            alert("קרתה שגיאה. בדוק את ה-API Key שלך.");
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
